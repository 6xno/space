<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Unknown</title>

<style>
html,body{
margin:0;
height:100%;
overflow:hidden;
background:#000;
font-family:Arial;
}

/* الخلفية */
canvas{
position:fixed;
top:0;
left:0;
}

/* النقطة التي يضغط عليها */
#trigger{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:14px;
height:14px;
background:white;
border-radius:50%;
cursor:pointer;
box-shadow:0 0 15px white;
transition:0.3s;
}

#trigger:hover{
transform:translate(-50%,-50%) scale(1.5);
}

/* صفحة الجيف */
#main{
display:none;
position:fixed;
inset:0;
}

#main img{
width:100%;
height:100%;
object-fit:cover;
}

/* الانستغرام */
#credit{
position:fixed;
top:10px;
right:10px;
z-index:100;
}

#credit a{
color:white;
text-decoration:none;
display:flex;
align-items:center;
gap:5px;
}

#credit img{
width:18px;
}
</style>
</head>

<body>

<div id="credit">
<a href="https://instagram.com/f6xno" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
@f6xno
</a>
</div>

<canvas id="bg"></canvas>

<div id="trigger"></div>

<div id="main">
<img src="image.gif">
<audio id="sound" src="sound.mp3"></audio>
</div>

<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let particles = [];

for(let i=0;i<120;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speed:Math.random()*0.5
});
}

function animate(){
ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fill();

p.y+=p.speed;

if(p.y>canvas.height){
p.y=0;
p.x=Math.random()*canvas.width;
}
});

requestAnimationFrame(animate);
}

animate();

/* الضغط على النقطة */
const trigger=document.getElementById("trigger");
const main=document.getElementById("main");
const sound=document.getElementById("sound");

trigger.onclick=()=>{
document.querySelector("canvas").style.display="none";
trigger.style.display="none";

main.style.display="block";

document.documentElement.requestFullscreen();

sound.play();
};
</script>

</body>
</html>
